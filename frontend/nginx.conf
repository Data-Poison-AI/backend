server {
    listen 80;
    server_name poisonai.szapatar.dev;

    # Redirigir todo HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name poisonai.szapatar.dev;

    ssl_certificate     /etc/letsencrypt/live/poisonai.szapatar.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poisonai.szapatar.dev/privkey.pem;

    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index html/index.html;

    location = / {
        return 301 /html/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        client_max_body_size 200M;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
