server {
    listen 80;
    server_name localhost;

    # Allow large uploads (zip files)
    client_max_body_size 200M;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index html/index.html;

    # Redirect root to the main frontend page
    location = / {
        return 301 /html/index.html;
    }

    # Serve static files - try file first, then directory
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy all /api requests to the Node.js Backend Container
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Allow long AI processing requests (10 minutes)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;

        # For large file uploads
        client_max_body_size 200M;

        # Security/CORS forwarding headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
