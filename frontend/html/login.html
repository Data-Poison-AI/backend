<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoisonAI Autenticación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../icons/icon.svg" type="image/svg+xml">
    <link rel="manifest" href="../manifest.json">

    <!-- Configuración de Tailwind CSS -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#08050f',
                        brandpurple: '#b066ff',
                        brandgreen: '#00e676',
                    }
                }
            }
        }
    </script>

    <!-- Si ya está logueado, llevar al scanner directo -->
    <script>
        if (localStorage.getItem('user')) {
            window.location.replace('scanner.html');
        }
    </script>
</head>

<body class="bg-darkbg min-h-screen flex flex-col">

    <!-- navbar -->
    <nav class="nav-glass sticky top-0 z-[100] transition-all flex intems-center justify-center">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group cursor-pointer"
                style="text-decoration:none; color:inherit;">
                <div class="relative">
                    <i
                        class="fa-solid fa-shield-halved text-brandgreen text-2xl group-hover:rotate-[360deg] transition-transform duration-700"></i>
                    <div class="absolute inset-0 bg-brandgreen/40 blur-md"></div>
                </div>
                <span class="hidden sm:block text-xl font-bold tracking-tighter uppercase">Poison<span
                        class="text-brandgreen">AI</span></span>
            </a>
            <div class="hidden md:flex items-center gap-8 text-sm font-bold uppercase tracking-widest">
                <a href="index.html" data-t="nav_home" class="text-gray-400 hover:text-white transition">Inicio</a>
                <a href="docs.html" data-t="nav_docs"
                    class="text-gray-400 hover:text-white transition">Documentación</a>
                <a href="#" data-t="nav_contact" class="text-gray-400 hover:text-white transition">Contacto</a>
            </div>

            <div class="flex items-center gap-3 md:gap-8 text-sm font-bold uppercase tracking-widest">
                <!-- Botón de idioma -->
                <button onclick="toggleLang()"
                    class="text-gray-400 hover:text-white transition flex items-center gap-2 border border-white/10 px-3 py-1.5 rounded-lg hover:bg-white/5">
                    <i class="fa-solid fa-globe"></i>
                    <span id="lang-label">EN</span>
                </button>

                <a href="login.html" data-t="nav_login"
                    class="bg-gradient-to-r from-brandpurple to-brandgreen text-white px-4 md:px-6 py-2 rounded-full shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:scale-105 transition text-xs md:text-sm whitespace-nowrap">Iniciar
                    Sesión</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">

        <!-- LOGIN -->
        <div id="login-container" class="w-full max-w-md border border-white rounded-2xl p-9 text-center">
            <div class="flex flex-col items-center mb-9">
                <a href="index.html" class="flex items-center gap-2 mb-9" style="text-decoration:none; color:inherit;">
                    <i class="fa-solid fa-shield-halved text-2xl" style="color: var(--purple);"></i>
                    <span class="text-xl font-bold text-white" style="letter-spacing: 0.03em;">
                        POISON<span style="color: var(--green);">AI</span>
                    </span>
                </a>
                <h2 data-t="login_title" class="text-white text-lg font-semibold mt-4">Iniciar Sesión</h2>
                <div class="title-line"></div>
            </div>

            <form id="login-form" class="space-y-4">
                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-regular fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="login-email" data-t-placeholder="login_email" placeholder="Email" required
                        class="input-field">
                </div>

                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="login-password" data-t-placeholder="login_password"
                        placeholder="Contraseña" required class="input-field" style="padding-right: 2.5rem;">
                    <button type="button" onclick="togglePassword('login-password', this)"
                        class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-600 hover:text-white transition">
                        <i class="fa-regular fa-eye text-sm"></i>
                    </button>
                </div>

                <button type="submit" data-t="login_btn" class="btn-primary">Iniciar Sesión</button>
            </form>

            <p class="text-gray-500 text-sm mt-8">
                <span data-t="login_no_account">¿No tienes cuenta?</span>
                <a href="#" onclick="toggleAuth()" data-t="login_register_link" class="auth-link">Regístrate</a>
            </p>
        </div>

        <!-- register -->
        <div id="register-container" class="w-full max-w-md rounded-2xl p-10 border border-white text-center hidden">
            <div class="flex flex-col items-center mb-6">
                <a href="index.html" class="flex items-center gap-2 mb-2" style="text-decoration:none; color:inherit;">
                    <i class="fa-solid fa-shield-halved text-2xl" style="color: var(--purple);"></i>
                    <span class="text-xl font-bold text-white" style="letter-spacing: 0.03em;">
                        POISON<span style="color: var(--green);">AI</span>
                    </span>
                </a>
                <h2 data-t="register_title" class="text-white text-lg font-semibold mt-4">Crear Cuenta</h2>
                <div class="title-line"></div>
            </div>

            <form id="register-form" class="space-y-4">
                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-regular fa-user text-sm"></i>
                    </span>
                    <input type="text" id="reg-name" data-t-placeholder="reg_name" placeholder="Nombre de usuario"
                        required class="input-field">
                </div>

                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-regular fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="reg-email" data-t-placeholder="reg_email" placeholder="Email" required
                        class="input-field">
                </div>

                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="reg-password" data-t-placeholder="reg_password" placeholder="Contraseña"
                        required class="input-field" style="padding-right: 2.5rem;">
                    <button type="button" onclick="togglePassword('reg-password', this)"
                        class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-600 hover:text-white transition">
                        <i class="fa-regular fa-eye text-sm"></i>
                    </button>
                </div>

                <div class="relative input-group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="reg-confirm-password" data-t-placeholder="reg_confirm"
                        placeholder="Confirmar contraseña" required class="input-field">
                </div>

                <button type="submit" data-t="register_btn" class="btn-primary">Registrarse</button>
            </form>

            <p class="text-gray-500 text-sm mt-8">
                <span data-t="register_have_account">¿Ya tienes cuenta?</span>
                <a href="#" onclick="toggleAuth()" data-t="register_login_link" class="auth-link">Inicia sesión</a>
            </p>
        </div>

    </main>

    <script src="../js/login.js"></script>


    <!-- Traducciones -->
    <script>
        const translations = {
            es: {
                nav_home: "Inicio",
                nav_docs: "Documentación",
                nav_contact: "Contacto",
                nav_login: "Iniciar Sesión",
                login_title: "Iniciar Sesión",
                login_email: "Email",
                login_password: "Contraseña",
                login_btn: "Iniciar Sesión",
                login_no_account: "¿No tienes cuenta?",
                login_register_link: "Regístrate",
                register_title: "Crear Cuenta",
                reg_name: "Usuario",
                reg_email: "Email",
                reg_password: "Contraseña",
                reg_confirm: "Confirmar contraseña",
                register_btn: "Registrarse",
                register_have_account: "¿Ya tienes cuenta?",
                register_login_link: "Inicia sesión"
            },
            en: {
                nav_home: "Home",
                nav_docs: "Documentation",
                nav_contact: "Contact",
                nav_login: "Log In",
                login_title: "Log In",
                login_email: "Email",
                login_password: "Password",
                login_btn: "Log In",
                login_no_account: "Don't have an account?",
                login_register_link: "Sign up",
                register_title: "Create Account",
                reg_name: "Username",
                reg_email: "Email",
                reg_password: "Password",
                reg_confirm: "Confirm password",
                register_btn: "Register",
                register_have_account: "Already have an account?",
                register_login_link: "Log in"
            }
        };

        // idioma por defecto
        let currentLang = 'es';

        function toggleLang() {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            const t = translations[currentLang];

            document.getElementById('lang-label').textContent = currentLang === 'es' ? 'EN' : 'ES';
            document.documentElement.lang = currentLang;

            // Cambiar textos normales
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if (t[key] !== undefined) {
                    el.textContent = t[key];
                }
            });

            // Cambiar placeholders de inputs
            document.querySelectorAll('[data-t-placeholder]').forEach(el => {
                const key = el.getAttribute('data-t-placeholder');
                if (t[key] !== undefined) {
                    el.placeholder = t[key];
                }
            });
        }
    </script>

</body>

</html>
